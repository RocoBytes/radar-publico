# Radar Público — Docker Compose para producción (Digital Ocean Droplet)
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Diferencias con dev:
# - No expone puertos de postgres/redis al host (solo red interna)
# - No monta código fuente (usa imagen built)
# - No incluye Flower ni MailHog
# - Usa nginx como reverse proxy con TLS
# - Workers con concurrencia mayor

services:
  postgres:
    ports: []
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    ports: []
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  api:
    build:
      target: production
    volumes: []
    ports: []
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requerido en .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY requerido en .env}
    restart: always
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --access-logfile - --error-logfile -
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  worker:
    build:
      target: production
    volumes: []
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY requerido en .env}
    restart: always
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  beat:
    build:
      target: production
    volumes: []
    environment:
      ENVIRONMENT: production
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  worker_scraper:
    build:
      target: playwright
    volumes: []
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY requerido en .env}
      PLAYWRIGHT_HEADLESS: "true"
    restart: always
    command: celery -A app.celery_app worker -Q scraping --concurrency=1 --loglevel=info
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  web:
    build:
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    volumes: []
    ports: []
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      INTERNAL_API_URL: http://api:8000
    restart: always
    command: node server.js
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Reverse proxy con TLS automático (Caddy)
  proxy:
    image: caddy:2-alpine
    container_name: radar_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_APP: ${DOMAIN_APP:?DOMAIN_APP requerido en .env}
    volumes:
      - ./nginx/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - radar_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
