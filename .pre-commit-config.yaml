# Pre-commit hooks para Radar Público
# CLAUDE.md §7: no skipear con --no-verify salvo emergencias documentadas
#
# Instalación:
#   pip install pre-commit
#   pre-commit install
#
# Correr manualmente sobre todos los archivos:
#   pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  # ============================================================
  # Checks básicos (pre-commit nativo)
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # ============================================================
  # Gitleaks — detección de secretos (regla de oro #1)
  # NUNCA commitear .env, API keys, tokens o passwords
  # ============================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ============================================================
  # Ruff — linter + formatter Python (CLAUDE.md §4)
  # Equivale a: ruff check --fix && ruff format
  # ============================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.2
    hooks:
      - id: ruff
        name: ruff (lint + autofix)
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: ^backend/
      - id: ruff-format
        name: ruff (format)
        files: ^backend/

  # ============================================================
  # Mypy — type checker Python en modo strict (CLAUDE.md §4)
  # ============================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (type check backend)
        files: ^backend/app/
        args:
          - "--config-file=backend/pyproject.toml"
          - "--ignore-missing-imports"
        additional_dependencies:
          # Stubs necesarios para mypy strict
          - "fastapi==0.115.0"
          - "pydantic==2.9.2"
          - "pydantic-settings==2.6.0"
          - "sqlalchemy[mypy]==2.0.36"
          - "types-python-dateutil"
          - "types-pytz"
          - "types-passlib"

  # ============================================================
  # ESLint — linter TypeScript/React (CLAUDE.md §4)
  # Requiere que el proyecto tenga node_modules instalados
  # ============================================================
  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (frontend cliente)
        language: system
        types: [file]
        files: ^frontend/src/.*\.(ts|tsx)$
        entry: bash -c 'cd frontend && npx eslint --max-warnings=0 "$@"' --
        pass_filenames: true

      - id: eslint-admin
        name: eslint (frontend admin)
        language: system
        types: [file]
        files: ^frontend-admin/src/.*\.(ts|tsx)$
        entry: bash -c 'cd frontend-admin && npx eslint --max-warnings=0 "$@"' --
        pass_filenames: true
