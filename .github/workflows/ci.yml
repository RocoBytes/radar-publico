# CI — Radar Público
# CLAUDE.md §7: corre tests y linters en cada PR a main
#
# Jobs:
#   lint-backend  → ruff + mypy
#   lint-frontend → eslint + typecheck (cliente y admin)
#   test-backend  → pytest con postgres+redis reales
#
# Definition of Done (CLAUDE.md roadmap):
#   - Tests unitarios e integración pasando
#   - Cobertura > 70% en services/

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancelar runs anteriores del mismo PR para ahorrar minutos
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Backend: lint (ruff + mypy)
  # ============================================================
  lint-backend:
    name: Lint backend (ruff + mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias de dev
        run: |
          pip install --upgrade pip
          pip install ruff==0.7.2 mypy==1.13.0
          # Stubs para mypy
          pip install \
            fastapi==0.115.0 \
            pydantic==2.9.2 \
            pydantic-settings==2.6.0 \
            "sqlalchemy[mypy]==2.0.36" \
            types-python-dateutil \
            types-pytz \
            types-passlib \
            structlog \
            celery \
            httpx

      - name: ruff check (lint)
        run: ruff check backend/app
        working-directory: ${{ github.workspace }}

      - name: ruff format --check
        run: ruff format --check backend/app
        working-directory: ${{ github.workspace }}

      - name: mypy (type check)
        run: mypy app --config-file pyproject.toml
        working-directory: ${{ github.workspace }}/backend

  # ============================================================
  # Frontend cliente: ESLint + TypeScript
  # ============================================================
  lint-frontend:
    name: Lint frontend cliente (eslint + tsc)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: TypeScript check
        run: npm run typecheck
        working-directory: frontend

  # ============================================================
  # Frontend admin: ESLint + TypeScript
  # ============================================================
  lint-frontend-admin:
    name: Lint frontend admin (eslint + tsc)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Instalar dependencias
        # frontend-admin no tiene lockfile hasta que se agregue su servicio Docker (Sprint 6)
        run: npm install --legacy-peer-deps
        working-directory: frontend-admin

      - name: ESLint
        run: npm run lint
        working-directory: frontend-admin

      - name: TypeScript check
        run: npm run typecheck
        working-directory: frontend-admin

  # ============================================================
  # Backend: tests (pytest con postgres + redis)
  # ============================================================
  test-backend:
    name: Tests backend (pytest)
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: radar
          POSTGRES_PASSWORD: radar_test_password
          POSTGRES_DB: radar_test
          POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U radar -d radar_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: backend

      - name: Cargar schema en Postgres de test
        env:
          PGPASSWORD: radar_test_password
        run: |
          psql -h localhost -U radar -d radar_test -f schema.sql
        working-directory: ${{ github.workspace }}

      - name: Correr pytest
        env:
          DATABASE_URL: postgresql+asyncpg://radar:radar_test_password@localhost:5432/radar_test
          DATABASE_URL_SYNC: postgresql://radar:radar_test_password@localhost:5432/radar_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          JWT_SECRET: test_jwt_secret_min_32_chars_long
          ENCRYPTION_KEY: test_encryption_key_32_bytes____
          ENVIRONMENT: test
        run: |
          pytest app/tests \
            --cov=app/services \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v
        working-directory: backend

  # ============================================================
  # Gate: todos los jobs deben pasar para mergear
  # ============================================================
  ci-pass:
    name: CI completo
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, lint-frontend-admin, test-backend]
    if: always()
    steps:
      - name: Verificar resultados
        run: |
          if [[ "${{ needs.lint-backend.result }}" != "success" ]] ||
             [[ "${{ needs.lint-frontend.result }}" != "success" ]] ||
             [[ "${{ needs.lint-frontend-admin.result }}" != "success" ]] ||
             [[ "${{ needs.test-backend.result }}" != "success" ]]; then
            echo "❌ Uno o más jobs fallaron"
            exit 1
          fi
          echo "✅ CI completo — todos los checks pasaron"
