# Alembic configuration file
# Referencia: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Ruta al directorio de migraciones (relativa a este archivo)
script_location = alembic

# Formato del nombre de archivo para nuevas migraciones
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone para los timestamps en los nombres de archivo
timezone = UTC

# DATABASE_URL se inyecta desde env en alembic/env.py — no hardcodear aquí
# sqlalchemy.url =

[post_write_hooks]
# Sin hooks por defecto. Si agrego ruff:
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
